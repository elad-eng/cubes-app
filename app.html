<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קיובס | פיקוד יומי</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">🏗️ קיובס</div>
  <nav class="topbar-nav">
    <a class="nav-btn active" href="app.html">🎯 פיקוד יומי</a>
    <a class="nav-btn" href="projects.html">🏗️ פרויקטים</a>
    <a class="nav-btn" href="workers.html">👷 מתקינים</a>
    <a class="nav-btn" href="alerts.html">🚨 התראות</a>
    <a class="nav-btn" href="update.html">📝 דיווח שטח</a>
  </nav>
  <div class="topbar-right">
    <span class="user-badge" id="userEmail"></span>
    <button class="logout-btn" onclick="signOut()">יציאה</button>
  </div>
</div>

<div class="page">

  <!-- KPIs -->
  <div class="kpi-row">
    <div class="kpi-card" style="--accent-color:#4ade80">
      <div class="kpi-label">פרויקטים פעילים</div>
      <div class="kpi-value" id="kpiActive">—</div>
      <div class="kpi-sub">בביצוע כרגע</div>
    </div>
    <div class="kpi-card" style="--accent-color:#fbbf24">
      <div class="kpi-label">בעצירה</div>
      <div class="kpi-value" id="kpiStopped">—</div>
      <div class="kpi-sub">ממתין לפתרון</div>
    </div>
    <div class="kpi-card" style="--accent-color:#f87171">
      <div class="kpi-label">צרכי תגבור</div>
      <div class="kpi-value" id="kpiReinforce">—</div>
      <div class="kpi-sub">בקשות פתוחות</div>
    </div>
    <div class="kpi-card" style="--accent-color:#60a5fa">
      <div class="kpi-label">סה"כ מתקינים</div>
      <div class="kpi-value" id="kpiWorkers">—</div>
      <div class="kpi-sub">רשומים במערכת</div>
    </div>
    <div class="kpi-card" style="--accent-color:#f87171">
      <div class="kpi-label">התראות פעילות</div>
      <div class="kpi-value" id="kpiAlerts">—</div>
      <div class="kpi-sub">ויזות ותעודות</div>
    </div>
  </div>

  <div class="grid-2">
    <!-- עדכוני שטח אחרונים -->
    <div class="card">
      <h3>📋 עדכוני שטח אחרונים</h3>
      <div id="recentUpdates">
        <div class="loading"><div class="spinner"></div> טוען...</div>
      </div>
    </div>

    <!-- פרויקטים עם בעיות -->
    <div class="card">
      <h3>⚠️ דורשים תשומת לב</h3>
      <div id="attentionProjects">
        <div class="loading"><div class="spinner"></div> טוען...</div>
      </div>
    </div>
  </div>

  <!-- פרויקטים לפי מנהל -->
  <div class="card">
    <h3>👷 עומס לפי מנהל פרויקט</h3>
    <canvas id="managerChart" height="80"></canvas>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://dupxadofImtledxajsom.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_L943jdXVfy4YkkKpX40law_T9--wcvy';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  document.getElementById('userEmail').textContent = session.user.email;
  loadData();
}

async function loadData() {
  // טען פרויקטים
  const { data: projects } = await db.from('projects').select('*').eq('is_active', true);
  const { data: workers } = await db.from('workers').select('*').eq('is_active', true);
  const { data: updates } = await db.from('field_updates').select('*').order('created_at', { ascending: false }).limit(5);

  if (projects) {
    const active = projects.filter(p => p.status === 'בביצוע').length;
    const stopped = projects.filter(p => p.status === 'בעצירה').length;
    const reinforce = projects.filter(p => p.reinforce_needed && p.reinforce_needed.trim()).length;
    document.getElementById('kpiActive').textContent = active;
    document.getElementById('kpiStopped').textContent = stopped;
    document.getElementById('kpiReinforce').textContent = reinforce;
    renderAttention(projects);
    renderManagerChart(projects);
  }

  if (workers) {
    document.getElementById('kpiWorkers').textContent = workers.length;
    const today = new Date();
    const in30 = new Date(); in30.setDate(in30.getDate() + 30);
    const alerts = workers.filter(w => {
      const v = w.visa_expiry ? new Date(w.visa_expiry) : null;
      const h = w.height_cert_expiry ? new Date(w.height_cert_expiry) : null;
      return (v && v <= in30) || (h && h <= in30);
    }).length;
    document.getElementById('kpiAlerts').textContent = alerts;
  }

  if (updates) renderRecentUpdates(updates);
}

function renderRecentUpdates(updates) {
  const el = document.getElementById('recentUpdates');
  if (!updates.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px">אין עדכונים עדיין</p>'; return; }
  el.innerHTML = updates.map(u => `
    <div style="border-bottom:1px solid var(--border);padding:10px 0;last-of-type:border:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;font-weight:700">${u.project_name || '—'}</span>
        <span style="font-size:11px;color:var(--text-muted)">${u.update_date || ''}</span>
      </div>
      <p style="font-size:12px;color:var(--text-muted)">${(u.content || '').substring(0, 120)}${u.content?.length > 120 ? '...' : ''}</p>
      ${u.needs_reinforcement ? '<span class="badge badge-red" style="margin-top:4px">⚠ נדרש תגבור</span>' : ''}
    </div>
  `).join('');
}

function renderAttention(projects) {
  const el = document.getElementById('attentionProjects');
  const attention = projects.filter(p =>
    p.status === 'בעצירה' || (p.reinforce_needed && p.reinforce_needed.trim())
  );
  if (!attention.length) { el.innerHTML = '<p style="color:var(--green);font-size:13px">✓ הכל תקין</p>'; return; }
  el.innerHTML = attention.map(p => `
    <div class="alert-item ${p.status === 'בעצירה' ? '' : 'yellow'}">
      <div class="alert-title">${p.status === 'בעצירה' ? '🔴' : '🟡'} ${p.name}</div>
      <div class="alert-sub">
        ${p.status === 'בעצירה' ? 'בעצירה' : ''}
        ${p.reinforce_needed ? '| תגבור: ' + p.reinforce_needed : ''}
        ${p.manager ? '| ' + p.manager : ''}
      </div>
    </div>
  `).join('');
}

function renderManagerChart(projects) {
  const mgrs = {};
  projects.forEach(p => {
    const m = (p.manager || '').split(' - ')[0] || 'אחר';
    mgrs[m] = (mgrs[m] || 0) + 1;
  });
  const sorted = Object.entries(mgrs).sort((a,b) => b[1]-a[1]);
  new Chart(document.getElementById('managerChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(e => e[0]),
      datasets: [{ data: sorted.map(e => e[1]), backgroundColor: ['#34d399','#60a5fa','#f59e0b','#c084fc','#f87171','#38bdf8','#a78bfa','#fb923c'], borderRadius: 6 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8892b0', stepSize: 1 }, grid: { color: '#252b4a' } },
        y: { ticks: { color: '#c8d6f5' }, grid: { display: false } }
      }
    }
  });
}

async function signOut() {
  await db.auth.signOut();
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
